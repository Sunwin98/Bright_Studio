<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright Studio</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/scriptlab.css">
</head>
<body>
  <div id="shell">
    <!-- Custom titlebar (frameless pywebview window) -->
    <div id="titlebar">
      <div class="tb-title">
        <span>BRIGHT STUDIO</span>
        <span class="jp">ブライトスタジオ</span>
      </div>
      <div class="tb-controls">
        <button class="tb-btn" id="tb-min" title="ย่อ">–</button>
        <button class="tb-btn" id="tb-max" title="ขยาย">▢</button>
        <button class="tb-btn close" id="tb-close" title="ปิด">✕</button>
      </div>
    </div>

    <div id="app">
      <nav id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-logo"></div>
          <div class="brand-text">
            <div class="brand-title">Bright Studio</div>
            <div class="brand-sub">スタジオ Studio</div>
          </div>
        </div>
        <div class="sidebar-section">เครื่องมือ / ツール</div>
        <ul id="tab-list" class="tab-list"><!-- tabs injected by app.js --></ul>
        <div class="sidebar-footer">
          <span class="status-dot" id="conn-dot"></span>
          <span id="conn-text">เชื่อมต่อ...</span>
        </div>
      </nav>
      <video id="main-bg-video" autoplay loop muted playsinline poster="/assets/bg_night_city.png">
        <source src="/assets/mp4/Railway_crossing_in_misty_morning_202607111256.mp4" type="video/mp4">
      </video>
      <main id="main">
        <div class="loading">กำลังโหลด...</div>
      </main>
    </div>
  </div>

  <!-- Global CRT scanline overlay -->
  <div id="crt-overlay"></div>

  <!-- Intro boot overlay (fades out on load) -->
  <div id="intro-boot">
    <video class="intro-bg-video" autoplay loop muted playsinline poster="/assets/bg_intro.png">
      <source src="/assets/mp4/Countryside_road_in_Itomori_morning_202607111254.mp4" type="video/mp4">
    </video>
    <div class="intro-logo"></div>
    <div class="intro-title">BRIGHT <span class="jp">スタジオ</span></div>
    <div class="intro-bar"><i></i></div>
    <div class="intro-logs" id="intro-logs"></div>
  </div>

  <script src="/vendor/marked.min.js"></script>
  <script src="/js/neutralino.js"></script>
  <script src="/js/boot-neutralino.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
